name: Validate Skill

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check SKILL.md exists
      run: |
        if [ ! -f "SKILL.md" ]; then
          echo "Error: SKILL.md not found"
          exit 1
        fi
        echo "✅ SKILL.md found"
    
    - name: Validate YAML frontmatter
      run: |
        if ! grep -q "^---$" SKILL.md; then
          echo "Error: SKILL.md missing YAML frontmatter"
          exit 1
        fi
        if ! grep -q "^name:" SKILL.md; then
          echo "Error: SKILL.md missing 'name' field"
          exit 1
        fi
        if ! grep -q "^description:" SKILL.md; then
          echo "Error: SKILL.md missing 'description' field"
          exit 1
        fi
        echo "✅ YAML frontmatter valid"
    
    - name: Check references directory
      run: |
        if [ ! -d "references" ]; then
          echo "Warning: references/ directory not found"
        else
          echo "✅ references/ directory exists"
          ls -la references/
        fi
    
    - name: Check scripts directory
      run: |
        if [ ! -d "scripts" ]; then
          echo "Warning: scripts/ directory not found"
        else
          echo "✅ scripts/ directory exists"
          ls -la scripts/
        fi
    
    - name: Validate validation script
      run: |
        if [ -f "scripts/validate-seo.js" ]; then
          if ! node scripts/validate-seo.js --help 2>/dev/null; then
            echo "✅ Script exists (help flag not required)"
          else
            echo "✅ Validation script functional"
          fi
        else
          echo "Warning: validate-seo.js not found"
        fi
    
    - name: Check README
      run: |
        if [ ! -f "README.md" ]; then
          echo "Error: README.md not found"
          exit 1
        fi
        echo "✅ README.md found"
    
    - name: Check LICENSE
      run: |
        if [ ! -f "LICENSE" ]; then
          echo "Error: LICENSE not found"
          exit 1
        fi
        echo "✅ LICENSE found"
    
    - name: Skill validation summary
      run: |
        echo "=================================="
        echo "Skill Validation Summary"
        echo "=================================="
        echo "✅ All required files present"
        echo "✅ YAML frontmatter valid"
        echo "✅ Skill structure correct"
        echo "=================================="
